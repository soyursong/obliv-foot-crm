# ─────────────────────────────────────────────────────────────────────────────
# Edge Function 게이트웨이 설정
#
# T-20260629-foot-INGEST-EF-401-VERIFYJWT (P0 hotfix):
#   도파민 outbound POST는 X-Callback-Secret(=DOPAMINE_CALLBACK_SECRET) 헤더로
#   인증한다(Supabase JWT 아님). 게이트웨이 기본값 verify_jwt=true 가 EF 코드
#   도달 전 'Missing authorization header'(401)로 거부 → 풋 예약 prod 저장 매번 실패.
#   verify_jwt=false 로 게이트웨이 JWT 검사를 끄고, 인증은 EF 코드 내부
#   X-Callback-Secret 검증(index.ts §AC-2, secret 불일치/누락 → 401 UNAUTHORIZED)에
#   위임한다. → 게이트웨이 우회로 secret 검증이 인증의 단일 관문이 되므로 unauth hole 없음.
# ─────────────────────────────────────────────────────────────────────────────
[functions.reservation-ingest-from-dopamine]
verify_jwt = false

# T-20260714-dopamine-FOOT-PREVCALL-VISITCONFIRM-SYNC-RENAME (reopen / runtime-plumbing fix):
#   dopamine-visitcall-receiver 는 도파민 TM 내원콜 결과(reachable/absent) push 를 X-Callback-Secret
#   (=DOPAMINE_CALLBACK_SECRET) 헤더로 인증한다(Supabase JWT 아님). 게이트웨이 기본 verify_jwt=true 면
#   EF 코드 도달 전 401(Missing authorization header) → '내원콜 방문확인' sync 매번 실패.
#   verify_jwt=false 로 게이트웨이 JWT 검사를 끄고 인증은 EF 내부 X-Callback-Secret 검증(index.ts §Auth,
#   secret 불일치/누락 → 401 UNAUTHORIZED)에 위임 → secret 검증이 인증 단일 관문이므로 unauth hole 없음
#   (reservation-ingest-from-dopamine 동일 컨벤션). ※원커밋 a00ed33a 에서 본 config 등록+실배포 둘 다 누락됨.
[functions.dopamine-visitcall-receiver]
verify_jwt = false

# T-20260708-foot-REDPAY-CLOSING-TAB (activation_gate):
#   redpay-reconcile 는 pg_cron(trigger_redpay_reconcile → net.http_post)이 X-Internal-Cron
#   헤더만 실어 호출한다(Supabase JWT 아님). 게이트웨이 기본 verify_jwt=true 면 EF 코드 도달
#   전 401 → 5분 폴러가 매번 거부되어 실 적재 불가. verify_jwt=false 로 게이트웨이 JWT 검사를
#   끄고 인증은 EF 내부(index.ts:121-123 X-Internal-Cron==INTERNAL_CRON_SECRET 또는
#   service_role Bearer)에 위임한다. 둘 다 불일치 → 401 이므로 unauth hole 없음.
[functions.redpay-reconcile]
verify_jwt = false

# T-20260618-foot-STAFF-ATTENDANCE-SSOT-CRM:
#   attendance-sync 는 pg_cron(trigger_attendance_sync → net.http_post)이 X-Internal-Cron
#   헤더만 실어 호출한다(Supabase JWT 아님). 게이트웨이 기본 verify_jwt=true 면 EF 코드 도달
#   전 401(UNAUTHORIZED_NO_AUTH_HEADER) → 15분 폴러가 매번 거부되어 staff_attendance 미적재
#   (실측 확인: DEPLOY-GO 집행 중 header-only 호출 401). verify_jwt=false 로 게이트웨이 JWT
#   검사를 끄고 인증은 EF 내부(index.ts: CRON_SECRET 있으면 X-Internal-Cron==CRON_SECRET,
#   불일치/누락 → 401)에 위임 → secret 검증이 인증의 단일 관문이므로 unauth hole 없음
#   (redpay-reconcile / reservation-ingest-from-dopamine 동일 컨벤션).
[functions.attendance-sync]
verify_jwt = false

# T-20260718-foot-CLOSING-HERALD-PORT-GOLDEN (shadow apply):
#   closing-confirmed-publisher 는 pg_cron worker(process_closing_confirmed_outbox → net.http_post)가
#   X-Internal-Cron 헤더(=vault internal_cron_secret)만 실어 호출한다(Supabase JWT 아님). 게이트웨이
#   기본 verify_jwt=true 면 EF 코드 도달 전 401 → 워커가 매번 거부되어 outbox pending→sent 전이 불가.
#   verify_jwt=false 로 게이트웨이 JWT 검사를 끄고 인증은 EF 내부(index.ts: X-Internal-Cron==CRON_SECRET,
#   불일치/누락 → 401)에 위임 → secret 검증이 인증의 단일 관문이므로 unauth hole 없음
#   (attendance-sync / redpay-reconcile / reservation-ingest-from-dopamine 동일 컨벤션).
#   ※첫 배포=shadow(config.mode='shadow', dispatch 0) → 워커가 live-flip 전엔 EF 미호출. live-flip=supervisor 소관.
[functions.closing-confirmed-publisher]
verify_jwt = false
