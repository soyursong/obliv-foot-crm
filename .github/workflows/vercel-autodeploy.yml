# ──────────────────────────────────────────────────────────────
# Vercel prod auto-deploy — main push 시 Vercel deploy hook 호출
#
# 배경 (T-20260708-infra-FOOT-VERCEL-AUTODEPLOY-WEBHOOK-DEAD):
#   Vercel 계정(shkimact-2940)에 GitHub 계정 미연결 상태 →
#   git push 주체(soyursong)가 Vercel 팀 멤버로 인증되지 않아
#   Git Integration 경유 배포가 "insufficient permissions"로 차단됨.
#   deploy hook 트리거는 팀 소유로 실행되어 이 체크를 우회한다.
#
# 주의:
#   - hook은 항상 main HEAD를 빌드한다 (커밋별 빌드 아님).
#   - Vercel 계정에 GitHub 연결이 복구되면 Git Integration 배포와
#     중복 빌드가 발생하므로 이 workflow 제거를 검토할 것.
#   - hook URL은 repo secret VERCEL_DEPLOY_HOOK_URL (프로젝트:
#     obliv-foot-crm / hook: gh-actions-main-autodeploy / ref: main)
# ──────────────────────────────────────────────────────────────
name: "Deploy · Vercel prod autodeploy"

on:
  push:
    branches: [main]

concurrency:
  group: vercel-autodeploy
  cancel-in-progress: false

jobs:
  trigger-vercel:
    name: "🚀 Trigger Vercel deploy hook"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: POST deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK_URL}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is empty"; exit 1
          fi
          RESP=$(curl -fsS -X POST "${HOOK_URL}")
          echo "hook response: ${RESP}"
          echo "${RESP}" | grep -q '"job"' || { echo "::error::unexpected hook response"; exit 1; }
