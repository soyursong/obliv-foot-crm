# Secret scan (gitleaks) — 평문 비번/키 commit 차단
# T-20260629-ops-TESTCRED-PLAINTEXT-LIVECRED Stage 3
# 타 CRM 이식: 이 파일 + .gitleaks.toml + scripts/secret-scan.sh 복사.
name: secret-scan

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # T-20260720-foot-CI-GATE-E164-PHONE-FIX 추가D:
    #   gitleaks-action@v2 는 pull_request 이벤트 스캔에 GITHUB_TOKEN 이 필요하다.
    #   push 이벤트는 토큰 없이 통과(잠복)했으나 PR 이벤트에서 첫 노출로 job 실패 → PR merge 차단.
    #   → job 레벨 최소권한(read) + step env 로 GITHUB_TOKEN 주입하여 PR 스캔 복원.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
