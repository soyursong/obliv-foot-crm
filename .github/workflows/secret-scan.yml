# Secret scan (gitleaks) — 평문 비번/키 commit 차단
# T-20260629-ops-TESTCRED-PLAINTEXT-LIVECRED Stage 3
# 타 CRM 이식: 이 파일 + .gitleaks.toml + scripts/secret-scan.sh 복사.
name: secret-scan

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
