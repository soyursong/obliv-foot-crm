# ──────────────────────────────────────────────
# Tier 2 — Nightly (매일 KST 02:00 = UTC 17:00)
# 전체 E2E + Visual + Functional 병렬 실행
# ──────────────────────────────────────────────
name: "CI · Nightly"

on:
  schedule:
    # KST 02:00 = UTC 17:00
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      suite:
        description: "실행할 스위트 (all / e2e / visual / functional)"
        required: false
        default: "all"

concurrency:
  group: ci-nightly
  cancel-in-progress: false

env:
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
  VITE_DISABLE_AUTH_LOCK: "1"
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  CI: "true"

jobs:
  # ── 공통: Build 검증 ──────────────────────
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── E2E 전체 ──────────────────────────────
  e2e-full:
    name: "🧪 E2E Full"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'e2e'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run all E2E specs
        run: npx playwright test tests/e2e/ --project=desktop-chrome

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-traces
          path: test-results/
          retention-days: 7

  # ── Visual 스냅샷 ─────────────────────────
  visual:
    name: "📸 Visual"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'visual'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Visual specs
        run: npx playwright test tests/visual/ --project=desktop-chrome

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-report
          path: playwright-report/
          retention-days: 14

      - name: Upload snapshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-traces
          path: test-results/
          retention-days: 7

  # ── Functional ────────────────────────────
  functional:
    name: "⚙️ Functional"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'functional'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Functional specs
        run: npx playwright test tests/functional/ --project=desktop-chrome

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: functional-traces
          path: test-results/
          retention-days: 7

  # ── 최종 요약 ─────────────────────────────
  summary:
    name: "📊 Nightly Summary"
    runs-on: ubuntu-latest
    needs: [e2e-full, visual, functional]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Nightly CI 결과"
          echo "- E2E Full: ${{ needs.e2e-full.result }}"
          echo "- Visual:   ${{ needs.visual.result }}"
          echo "- Functional: ${{ needs.functional.result }}"

          if [[ "${{ needs.e2e-full.result }}" == "failure" ]] || \
             [[ "${{ needs.visual.result }}" == "failure" ]] || \
             [[ "${{ needs.functional.result }}" == "failure" ]]; then
            echo "::error::하나 이상의 nightly 스위트가 실패했습니다."
            exit 1
          fi
