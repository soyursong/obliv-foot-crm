# ──────────────────────────────────────────────
# Tier 1 — Push (< 3 min 목표)
# TypeCheck + Vite Build + Critical-Flow E2E
# ──────────────────────────────────────────────
name: "CI · Push"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0) CHART-ACCESS-LOCK 가드 ─────────────────
  chart-access-lock:
    name: "🔒 Chart Access Lock"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: "차트 접근 경로 필수 심볼 검증"
        run: bash scripts/check-chart-access-lock.sh

  # ── 1) TypeScript 타입 체크 ──────────────────
  typecheck:
    name: "🔍 TypeCheck"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc -b --noEmit

  # ── 2) Vite 빌드 검증 ─────────────────────
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── 3) Critical Flow E2E (CF-1 ~ CF-5) ────
  critical-flow:
    name: "🧪 Critical Flow"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_DISABLE_AUTH_LOCK: "1"
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CI: "true"
      # T-20260720-foot-CHART-OPENGATE-SEED-ISOLATION-HARDEN QA#3 (CI-RED-MAIN-RESOLVE 미머지분 흡수):
      #   CF-1 "칸반 카드 발견"(exam_waiting)도 seedCheckIn(checked_in_at=new Date() UTC now) 후
      #   대시보드 칸반 가시성을 assert 한다. 대시보드 칸반 window 는 dateStr(브라우저-로컬 TZ)
      #   기준 `T00:00..23:59:59+09:00` — CI node·chromium 기본 UTC 이면 UTC 15:00~24:00(KST
      #   00:00~09:00) 구간에 dateStr 이 전날로 굳어 window 끝이 now 이전 → 시드 카드 배제 →
      #   타임아웃 하드 RED(= supervisor 가 관측한 "동일 signature", 실은 cleanup race 아닌 TZ 경계).
      #   운영 태블릿과 동일 KST 로 정렬해 봉합(회귀검출 무력화 아님 — 시드 카드가 실제로 떠야 GREEN).
      TZ: "Asia/Seoul"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Critical Flow specs
        run: npx playwright test tests/e2e/critical-flow/ --project=desktop-chrome

      - name: Upload report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: critical-flow-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: critical-flow-traces
          path: test-results/
          retention-days: 7

  # ── 4) Chart Open Gate (행위 기반 머지차단) ──
  # T-20260606-foot-CHART-OPEN-E2E-GATE AC-2 (supervisor GO 17:48 방식 B)
  # 심볼 스캐너(chart-access-lock)가 못 잡는 caller 배선 드리프트를
  # 차트오픈 행위 E2E로 머지차단. 7차 재발 구조 차단.
  chart-open-gate:
    name: "🗂️ Chart Open Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # T-20260713-foot-CI-E2E-RED-DIAGNOSE 는 chart-open-gate 를 critical-flow 뒤로 **직렬화**해
    #   두 job 의 동시 cleanupAll() 스윕 레이스를 막았다. 그러나 이 직렬화는 critical-flow flaky RED
    #   가 chart-open-gate 를 **영구 skip** 시켜 AC-3(≥10 rerun green) 증빙을 구조적으로 막았다
    #   (T-20260720-foot-CHART-OPENGATE-SEED-ISOLATION-HARDEN QA#2).
    # 이제 두 job 의 시드가 모두 run-scoped 마커(`[QA-FIXTURE]|token|ts`)라서 cleanupAll() 의
    #   전수 스윕이 서로의 in-flight 시드를 삭제할 수 없다(cross-run·cross-job race 원천 차단,
    #   fixtures.ts cleanupAll 1c/§4 scoped 제외 + seedCheckIn/seedReservation scoped 마커).
    #   → 직렬화 불필요. build 만 의존시켜 critical-flow 결과와 **독립** 병렬 실행한다
    #     (critical-flow flaky 여부와 무관하게 chart-open-gate 가 항상 실행 → AC-3 증빙 생성 가능).
    needs: [build]

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_DISABLE_AUTH_LOCK: "1"
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CI: "true"
      # T-20260720-foot-CHART-OPENGATE-SEED-ISOLATION-HARDEN QA#3 (RC 실증, trace run 29761362646):
      #   G1(칸반 exam_waiting)이 CI TZ=UTC 하에서 UTC 15:00~24:00(KST 00:00~09:00) 구간에 돌면
      #   대시보드 칸반 date-window(dateStr 브라우저-로컬 TZ 기준 `T00:00..23:59:59+09:00`)가
      #   전날로 굳어 시드 카드(checked_in_at=UTC now)를 배제 → card.waitFor 결정적 타임아웃.
      #   본 run 은 16:35Z(=01:35 KST)에 실행돼 정확히 그 구간 → G1 3회(retry 포함) 전부 RED,
      #   반면 G3/G4(어제·wide window)는 GREEN. = cleanup race 아님·순수 TZ 경계(retry 무효).
      #   node+chromium 을 운영 태블릿과 동일 Asia/Seoul 로 정렬해 봉합. 격리 디커플(needs:[build])은
      #   유지 — CI-RED-MAIN-RESOLVE 미머지분의 재직렬화(needs:critical-flow)는 QA#2 가 금지한 구조.
      TZ: "Asia/Seoul"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Chart Open Gate specs
        run: npm run test:chart-gate

      - name: Upload report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chart-open-gate-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chart-open-gate-traces
          path: test-results/
          retention-days: 7
