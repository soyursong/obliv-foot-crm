# ──────────────────────────────────────────────
# Tier 1 — Push (< 3 min 목표)
# TypeCheck + Vite Build + Critical-Flow E2E
# ──────────────────────────────────────────────
name: "CI · Push"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0) CHART-ACCESS-LOCK 가드 ─────────────────
  chart-access-lock:
    name: "🔒 Chart Access Lock"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: "차트 접근 경로 필수 심볼 검증"
        run: bash scripts/check-chart-access-lock.sh

  # ── 1) TypeScript 타입 체크 ──────────────────
  typecheck:
    name: "🔍 TypeCheck"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc -b --noEmit

  # ── 2) Vite 빌드 검증 ─────────────────────
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── 3) Critical Flow E2E (CF-1 ~ CF-5) ────
  critical-flow:
    name: "🧪 Critical Flow"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_DISABLE_AUTH_LOCK: "1"
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CI: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Critical Flow specs
        run: npx playwright test tests/e2e/critical-flow/ --project=desktop-chrome

      - name: Upload report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: critical-flow-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: critical-flow-traces
          path: test-results/
          retention-days: 7

  # ── 4) Chart Open Gate (행위 기반 머지차단) ──
  # T-20260606-foot-CHART-OPEN-E2E-GATE AC-2 (supervisor GO 17:48 방식 B)
  # 심볼 스캐너(chart-access-lock)가 못 잡는 caller 배선 드리프트를
  # 차트오픈 행위 E2E로 머지차단. 7차 재발 구조 차단.
  chart-open-gate:
    name: "🗂️ Chart Open Gate"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # T-20260713-foot-CI-E2E-RED-DIAGNOSE: critical-flow 와 chart-open-gate 는
    #   동일 shared-DB(rxlomoozakkjesdqjtvd)에 [QA-FIXTURE] 를 write 하고, global-setup/teardown
    #   의 cleanupAll() 이 마커로 전수 스윕한다. 두 job 이 동시(needs:[build] 병렬) 실행되면
    #   한 job 의 스윕이 다른 job 의 in-flight 시드(예: G3/G4 어제 예약)를 삭제 → 카드 소멸 →
    #   resvStatus=null(no_show 아님) → skip 미발동 → 교대성 하드 RED.
    #   → chart-open-gate 를 critical-flow 뒤로 직렬화해 동시 스윕 레이스를 원천 차단.
    needs: [build, critical-flow]

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_DISABLE_AUTH_LOCK: "1"
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CI: "true"
      # T-20260720-foot-CI-RED-MAIN-RESOLVE: KST-자정 경계 결정성 RED 실봉합.
      #   근본원인(trace 실증, run 29752843100): G1 시드 check_in.checked_in_at = new Date()(UTC now).
      #   대시보드 칸반 쿼리(Dashboard.tsx fetchSelfCheckIns L4300)는 window 를
      #   `${dateStr}T00:00..23:59:59+09:00` 로 잡는데, dateStr = format(new Date(),'yyyy-MM-dd')
      #   가 **브라우저-로컬 TZ** 로 계산된다. CI 는 node·chromium 이 모두 기본 UTC → UTC 15:00~24:00
      #   (=KST 00:00~09:00) 구간에 실행되면 dateStr 이 전날("2026-07-20")로 굳어 window 끝
      #   (2026-07-20T14:59:59+09:00 = 14:59:59Z)이 지금(≈15:20Z) 이전 → 시드 카드가 window 밖으로
      #   배제 → 진료대기 0 → card.waitFor 12s 타임아웃 하드 RED. **cross-run sweep race 아님**
      #   (trace: 대시보드는 실데이터 정상 렌더, 시드 row 는 존재하나 날짜창 필터로 제외).
      #   운영 태블릿은 Asia/Seoul 이라 prod 무영향 → CI TZ 를 prod 와 정렬해 봉합.
      #   TZ 는 node(process TODAY·date-fns) + chromium(JS Date) 양쪽에 전파되어 dateStr 이
      #   KST 당일로 계산됨 → window 가 now 를 포함 → 시드 카드 렌더. 회귀검출 무력화 아님
      #   (G6 정적 backstop·!isPast 가드·G3/G4 skip 로직 전부 불변, 시드 카드가 실제로 떠야 GREEN).
      TZ: "Asia/Seoul"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run Chart Open Gate specs
        run: npm run test:chart-gate

      - name: Upload report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chart-open-gate-report
          path: playwright-report/
          retention-days: 7

      - name: Upload traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chart-open-gate-traces
          path: test-results/
          retention-days: 7
