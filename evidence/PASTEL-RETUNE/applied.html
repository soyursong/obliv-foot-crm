<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><style>
*{box-sizing:border-box;font-family:-apple-system,"Apple SD Gothic Neo",sans-serif}
body{margin:0;padding:28px;background:#e8e8e8;color:#252525}
h1{font-size:18px;margin:0 0 16px}
.row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:16px;min-width:240px}
.lbl{font-size:11px;color:#888;margin-bottom:8px}
.idbadge{display:inline-flex;align-items:center;gap:6px;border-radius:9999px;padding:5px 11px;font-size:12px;font-weight:600}
.dot{height:7px;width:7px;border-radius:9999px;display:inline-block}
.resv{border:1px solid #C8DDA9;border-left:4px solid #9CBA6B;background:#EFF6E4;border-radius:10px;padding:10px 12px;font-size:13px}
.chip{display:inline-flex;border-radius:9999px;padding:2px 8px;font-size:11px;font-weight:600;margin-top:6px;background:#DCEDC8;color:#43562A}
.pill{display:inline-flex;border-radius:9999px;padding:3px 10px;font-size:12px;font-weight:600;margin-right:6px;background:#DCEDC8;color:#556E32}
.red{background:#FEE2E2;color:#B91C1C;border:1.5px solid #FCA5A5}
.sw{width:30px;height:30px;border-radius:6px;display:inline-block;margin-right:3px;border:1px solid rgba(0,0,0,.06)}
</style></head><body>
<h1>적용 확정 — ③ 따뜻한 파스텔 그린 (앵커 #DCEDC8 = sage-100) · T-20260623-GREEN-PASTEL-RETUNE</h1>
<div class="row">
 <div class="card"><div class="lbl">2번차트 신분증 확인완료 배지</div>
  <span class="idbadge" style="background:#DCEDC8;color:#556E32;border:1.5px solid #C8DDA9"><span class="dot" style="background:#83A451"></span>신분증 확인 완료</span></div>
 <div class="card"><div class="lbl">예약 초진 카드 + 초N 칩</div>
  <div class="resv">김OO · 10:30 초진<div><span class="chip">초 1</span></div></div></div>
 <div class="card"><div class="lbl">상태 칩 (체크인 / 재진) · 1·2번차트 정합</div>
  <span class="pill">체크인</span><span class="pill">재진</span></div>
 <div class="card"><div class="lbl">불변 — 신분증 필요(빨강 carve-out)</div>
  <span class="idbadge red">신분증 확인 필요</span></div>
 <div class="card"><div class="lbl">sage 스케일 (50→900)</div>
  <div style="margin-top:6px">
  <span class="sw" style="background:#EFF6E4"></span><span class="sw" style="background:#DCEDC8"></span><span class="sw" style="background:#C8DDA9"></span><span class="sw" style="background:#B4CD8A"></span><span class="sw" style="background:#9CBA6B"></span><span class="sw" style="background:#83A451"></span><span class="sw" style="background:#6B883F"></span><span class="sw" style="background:#556E32"></span><span class="sw" style="background:#43562A"></span><span class="sw" style="background:#333F1F"></span>
  </div></div>
</div></body></html>
