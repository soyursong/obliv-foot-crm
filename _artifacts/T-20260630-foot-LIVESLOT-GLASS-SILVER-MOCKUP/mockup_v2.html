<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>LIVESLOT GLASS SILVER — 시안 v2</title>
<style>
  /* ───────────────────────────────────────────────────────────
     시안 v2 — 총괄 회신 반영
       1) 회색 더 연하게: 실버 톤 전반 lighten (#F3F4F6↔#C7CDD4)
       2) 유리 볼록 효과 더 강하게: 상/좌 inset 하이라이트 ↑,
          하/우 inset 그림자 대비 ↑, outer box-shadow 볼록감 ↑
     - 힐러 노랑(#FFFDE7) 미접촉 · 무채색 실버 유지
     - 운영 미반영 · throwaway 로컬 시안
     ─────────────────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #fafbfc;
    -webkit-font-smoothing: antialiased;
  }
  .stage { padding: 40px; display: flex; flex-direction: column; gap: 8px; width: max-content; }
  .cap { font-size: 12px; color: #9aa3ad; letter-spacing: .02em; padding-left: 4px; }

  /* ===== 공통: 실버 metallic 테두리 (v2 — 더 연한 실버) ===== */
  .silver-frame {
    --sv-hi:   #F6F7F8;   /* v1 #E5E7EB → 더 밝게 */
    --sv-mid:  #E2E5E9;
    --sv-lo:   #C7CDD4;   /* v1 #9CA3AF → 더 밝은 실버로 lighten */
    padding: 3px;
    border-radius: 18px;
    background:
      linear-gradient(145deg, var(--sv-hi) 0%, var(--sv-mid) 42%, var(--sv-lo) 100%);
    /* outer 볼록감 강조 (v2) */
    box-shadow:
      0 1px 0 rgba(255,255,255,0.95),          /* 상단 테두리 하이라이트 */
      0 10px 26px rgba(120,131,146,0.34),      /* 볼록 드롭섀도 ↑ */
      0 2px 6px rgba(120,131,146,0.22);
  }

  /* ===== 유리(glass) 볼록 표면 — v2 강화 ===== */
  .glass {
    position: relative;
    border-radius: 15px;
    background:
      /* 좌상단 볼록 글로스 */
      radial-gradient(120% 90% at 22% 8%, rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.0) 46%),
      linear-gradient(160deg, rgba(255,255,255,0.62) 0%, rgba(244,246,248,0.42) 48%, rgba(225,229,234,0.40) 100%);
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,0.98),      /* 상단 inset 하이라이트 ↑ */
      inset 2px 0 3px rgba(255,255,255,0.7),       /* 좌측 inset 하이라이트 ↑ */
      inset 0 -4px 8px rgba(150,160,174,0.46),     /* 하단 inset 그림자 대비 ↑ */
      inset -3px 0 6px rgba(150,160,174,0.30);     /* 우측 inset 그림자 ↑ */
    overflow: hidden;
  }
  /* 상단 유리 반사 띠 — 볼록감 보강 */
  .glass::after {
    content: "";
    position: absolute; left: 0; right: 0; top: 0; height: 44%;
    background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0));
    pointer-events: none;
  }

  /* ───────── Surface A: 예약관리 '실시간 반영' 슬롯 카드 ───────── */
  .slot-card { width: 340px; }
  .slot-inner { padding: 18px 20px; position: relative; z-index: 1; }
  .slot-head { display:flex; align-items:center; justify-content:space-between; margin-bottom: 14px; }
  .slot-time { font-size: 26px; font-weight: 800; color: #2b3138; letter-spacing: -.01em; }
  .live-badge {
    display:inline-flex; align-items:center; gap:6px;
    font-size: 12px; font-weight: 700; color:#4b5563;
    background: linear-gradient(150deg, #FBFBFC, #DDE1E6);
    border: 1px solid rgba(199,205,212,0.9);
    padding: 5px 10px; border-radius: 999px;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.95), 0 1px 2px rgba(120,131,146,0.25);
  }
  .live-dot { width:7px; height:7px; border-radius:50%; background:#10b981; box-shadow:0 0 6px #34d399; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .slot-rows { display:flex; flex-direction:column; gap:9px; }
  .slot-row { display:flex; align-items:center; justify-content:space-between; }
  .slot-name { font-size:15px; color:#374151; font-weight:600; }
  .slot-meta { font-size:13px; color:#7b838d; }
  .slot-foot { margin-top:14px; display:flex; align-items:center; justify-content:space-between; }
  .slot-cap { font-size:13px; color:#6b7280; }
  .slot-cap b { color:#2b3138; font-weight:800; }
  .slot-pill {
    font-size:12px; font-weight:700; color:#4b5563;
    background:linear-gradient(150deg,#FAFBFC,#D9DDE2);
    padding:5px 11px; border-radius:8px;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.95), inset 0 -2px 3px rgba(150,160,174,0.35);
  }

  /* ───────── Surface B: 대시보드 상단 전광판 (LED) ───────── */
  .board { width: 720px; }
  .board-inner { padding: 16px 22px; display:flex; align-items:center; gap:18px; position:relative; z-index:1; }
  .board-label { font-size:13px; font-weight:800; color:#5b636d; white-space:nowrap; letter-spacing:.02em; }
  .leds { display:flex; gap:10px; flex:1; }
  .led {
    flex:1; height:34px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:800;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.9), inset 0 -2px 4px rgba(150,160,174,0.4);
  }
  /* 점등 (lit) */
  .led.on {
    color:#1f2937;
    background:linear-gradient(160deg, #FCFCFD 0%, #E6E9ED 60%, #D2D7DD 100%);
    box-shadow:
      inset 0 1px 2px rgba(255,255,255,0.98),
      inset 0 -3px 6px rgba(150,160,174,0.45),
      0 0 0 1px rgba(199,205,212,0.6),
      0 0 14px rgba(203,210,218,0.85);   /* 점등 글로우 */
  }
  /* 소등 (off) */
  .led.off {
    color:#aeb4bb;
    background:linear-gradient(160deg, #EEF0F2 0%, #DDE0E4 60%, #CDD2D8 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.7), inset 0 -2px 5px rgba(150,160,174,0.5);
  }
  .board-clock { font-size:20px; font-weight:800; color:#2b3138; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="stage">

  <!-- Surface A -->
  <div class="cap">A · 예약관리 /admin/reservations · '실시간 반영' 슬롯 카드 — 시안 v2</div>
  <div id="surfaceA" class="silver-frame slot-card">
    <div class="glass">
      <div class="slot-inner">
        <div class="slot-head">
          <div class="slot-time">14:30</div>
          <span class="live-badge"><span class="live-dot"></span>실시간 반영</span>
        </div>
        <div class="slot-rows">
          <div class="slot-row"><span class="slot-name">김○○ · 재진</span><span class="slot-meta">레이저 · C3</span></div>
          <div class="slot-row"><span class="slot-name">박○○ · 신규</span><span class="slot-meta">상담대기</span></div>
          <div class="slot-row"><span class="slot-name">이○○ · 패키지</span><span class="slot-meta">3/10회</span></div>
        </div>
        <div class="slot-foot">
          <span class="slot-cap">잔여 <b>2</b> / 10</span>
          <span class="slot-pill">예약 가능</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Surface B: 점등 (lit) -->
  <div class="cap" style="margin-top:18px;">B · 대시보드 상단 전광판 — 점등(lit) 위상 · 시안 v2</div>
  <div id="surfaceB_on" class="silver-frame board">
    <div class="glass">
      <div class="board-inner">
        <span class="board-label">실시간 현황</span>
        <div class="leds">
          <div class="led on">대기 4</div>
          <div class="led on">진료중 2</div>
          <div class="led on">상담 1</div>
          <div class="led on">시술 3</div>
        </div>
        <span class="board-clock">14:30</span>
      </div>
    </div>
  </div>

  <!-- Surface B: 소등 (off) -->
  <div class="cap" style="margin-top:18px;">B · 대시보드 상단 전광판 — 소등(off) 위상(깜빡 2위상) · 시안 v2</div>
  <div id="surfaceB_off" class="silver-frame board">
    <div class="glass">
      <div class="board-inner">
        <span class="board-label">실시간 현황</span>
        <div class="leds">
          <div class="led off">대기 4</div>
          <div class="led off">진료중 2</div>
          <div class="led off">상담 1</div>
          <div class="led off">시술 3</div>
        </div>
        <span class="board-clock">14:30</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
