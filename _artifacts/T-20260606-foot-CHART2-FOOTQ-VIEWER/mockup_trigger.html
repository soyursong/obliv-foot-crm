<!DOCTYPE html>
<!--
  T-20260606-foot-CHART2-FOOTQ-VIEWER — PHASE 1 시안(모형) [1/2]  · REV2 (총괄 피드백 반영 2026-07-08)
  진입점 컨텍스트: 2번차트 [상담내역] 탭에서 "발건강질문지 보기(별도창)" 버튼이 노출되는 화면 예시.
  ※ 정적 모형. 더미 데이터. prod 코드/DB 무변경.
  REV2 변경:
   - 컬러를 현행 CRM 톤앤매너로 통일: 쿨 뉴트럴 그레이(sage) 구조색 + 워엄 브라운(Umber/Taupe) 강조.
     (기존 bright teal #0d9488 계열은 CRM MONOCHROME-RECOLOR 이후 미사용 → 현행과 불일치라 교체)
   - 근거 팔레트: tailwind.config sage 램프 + teal 리맵 램프 + FootToeIllustration.tsx 워엄 토큰.
-->
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
  /* ── 현행 CRM 팔레트(담백·모노톤 통일) ── */
  :root{
    --ink:#2E3133;        /* sage-900 헤더/제목 */
    --ink-soft:#51585D;   /* sage-700 본문 강조 텍스트 */
    --label:#5C6166;      /* sage-600 라벨 */
    --line:#E4E6E8;       /* sage-100 라인 */
    --border:#D3D6D9;     /* sage-200 보더 */
    --surface:#F4F5F6;    /* sage-50 연한 면 */
    --chip-bg:#E4E6E8;    /* sage-100 칩 배경 */
    --primary:#443A35;    /* Umber — 주 강조(버튼) */
    --primary-hi:#6E6353; /* 워엄 미드 */
    --taupe:#C5BEA3;      /* Classic Taupe 밝은 강조 */
    --muted:#9CA1A6;      /* sage-400 보조 텍스트 */
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Pretendard','Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--surface); -webkit-font-smoothing:antialiased; }
  .frame { width:560px; margin:30px auto; }

  /* 차트 탭바 */
  .tabbar { display:flex; gap:4px; padding:0 4px; }
  .tab { font-size:12.5px; color:var(--label); padding:9px 14px; border-radius:9px 9px 0 0; font-weight:600; }
  .tab.active { color:var(--ink); background:#fff; border:1px solid var(--border); border-bottom:none; box-shadow:0 -2px 6px rgba(46,49,51,0.05); }

  .panel { background:#fff; border:1px solid var(--border); border-radius:0 14px 14px 14px; padding:20px; }
  .panel-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .panel-head h3 { font-size:14px; color:var(--ink); font-weight:700; }
  .refresh { width:28px; height:28px; border-radius:8px; border:1px solid var(--line); color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:14px; }

  /* 발건강질문지 결과 카드 (자가작성 제출분 존재 상태) */
  .hq-card { border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .hq-card .hq-head { display:flex; align-items:center; justify-content:space-between; padding:13px 15px; background:var(--surface); }
  .hq-card .hq-head .t { font-size:13px; font-weight:700; color:var(--ink-soft); }
  .hq-card .hq-head .d { font-size:11px; color:var(--muted); margin-top:2px; }
  .hq-card .hq-body { padding:14px 15px; border-top:1px solid var(--line); }
  .hq-card .prev { font-size:11.5px; color:var(--label); line-height:1.7; }
  .hq-card .prev b { color:var(--ink); font-weight:600; }

  /* ★ 신규 진입점: 발건강질문지 보기(별도창 이미지) — 워엄 브라운 primary 강조 */
  .view-btn {
    margin-top:14px; width:100%;
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:var(--primary); color:#fff; border:none; border-radius:10px;
    padding:12px; font-size:13.5px; font-weight:700; cursor:pointer;
    box-shadow:0 4px 10px rgba(68,58,53,0.22);
  }
  .view-btn .ico { font-size:15px; }
  .hint { text-align:center; font-size:10.5px; color:var(--muted); margin-top:8px; }

  /* 시안 안내 — 모노톤 뉴트럴(담백) */
  .callout { margin-top:16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 13px; font-size:11px; color:var(--label); line-height:1.6; }
  .callout b { color:var(--ink-soft); }
</style>
</head>
<body>
  <div class="frame">
    <!-- 차트 탭 -->
    <div class="tabbar">
      <div class="tab">기본정보</div>
      <div class="tab active">상담내역</div>
      <div class="tab">진료차트</div>
      <div class="tab">결제</div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h3>발건강질문지 자가작성</h3>
        <div class="refresh">⟳</div>
      </div>

      <div class="hq-card">
        <div class="hq-head">
          <div>
            <div class="t">발건강 질문지 (일반)</div>
            <div class="d">제출: 2026.07.05 14:32</div>
          </div>
        </div>
        <div class="hq-body">
          <div class="prev">
            <b>발 관련 증상</b> · 내성발톱, 발톱 변색 및 변형 &nbsp;/&nbsp;
            <b>고민 부위</b> · 좌 엄지·우 엄지 &nbsp;/&nbsp;
            <b>건강 상태</b> · 당뇨·고혈압 …
          </div>

          <!-- ★ A안 진입점 -->
          <button class="view-btn">
            <span class="ico">🖼️</span> 발건강질문지 보기 (별도창 이미지)
          </button>
          <div class="hint">클릭 시 새 창에서 자가작성 내용이 인쇄용 양식 이미지로 열립니다 ↗</div>
        </div>
      </div>

      <div class="callout">
        시안 안내 — 이 버튼(“발건강질문지 보기”)을 누르면 <b>별도 창</b>이 열리고,
        환자가 직접 작성한 내용이 <b>이미지 문서(A안)</b>로 표시됩니다. 옆의 문서 시안이 그 별도 창의 모습입니다.
      </div>
    </div>
  </div>
</body>
</html>
